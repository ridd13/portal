<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e5ddd3"/>
      <stop offset="100%" stop-color="#d5cdc3"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Generic portal/doorway arch symbol -->
  <g transform="translate(600, 290)" opacity="0.18">
    <!-- Arch/doorway -->
    <path d="M-40,50 L-40,-20 Q-40,-60 0,-60 Q40,-60 40,-20 L40,50" fill="none" stroke="#2c2418" stroke-width="5" stroke-linecap="round"/>
    <!-- Inner glow/light -->
    <path d="M-25,50 L-25,-10 Q-25,-40 0,-40 Q25,-40 25,-10 L25,50" fill="#2c2418" opacity="0.08"/>
    <!-- Light rays from the arch -->
    <line x1="0" y1="-30" x2="0" y2="-55" stroke="#b5651d" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="-15" y1="-25" x2="-25" y2="-48" stroke="#b5651d" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <line x1="15" y1="-25" x2="25" y2="-48" stroke="#b5651d" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <!-- Threshold step -->
    <line x1="-45" y1="50" x2="45" y2="50" stroke="#2c2418" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#2c2418" opacity="0.35" letter-spacing="4">DAS PORTAL</text>
</svg>