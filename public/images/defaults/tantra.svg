      <stop offset="0%" stop-color="#e0c8b0"/>
      <stop offset="100%" stop-color="#d0b898"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Flame with heart shape -->
  <g transform="translate(600, 295)" opacity="0.18">
