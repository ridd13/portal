<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8ccc0"/>
      <stop offset="100%" stop-color="#c8bcb0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Hands reaching toward a star/spark -->
  <g transform="translate(600, 285)" opacity="0.18">
    <!-- Central star/spark -->
    <g fill="#2c2418">
      <polygon points="0,-20 4,-6 18,-6 7,3 11,17 0,9 -11,17 -7,3 -18,-6 -4,-6"/>
    </g>
    <!-- Left hand (simplified) -->
    <path d="M-70,40 Q-55,20 -35,10 Q-20,5 -15,0" fill="none" stroke="#2c2418" stroke-width="5" stroke-linecap="round"/>
    <path d="M-70,40 Q-60,35 -55,45" fill="none" stroke="#2c2418" stroke-width="4" stroke-linecap="round"/>
    <!-- Right hand (simplified) -->
    <path d="M70,40 Q55,20 35,10 Q20,5 15,0" fill="none" stroke="#2c2418" stroke-width="5" stroke-linecap="round"/>
    <path d="M70,40 Q60,35 55,45" fill="none" stroke="#2c2418" stroke-width="4" stroke-linecap="round"/>
    <!-- Small sparkle dots -->
    <circle cx="-20" cy="-30" r="2.5" fill="#b5651d" opacity="0.5"/>
    <circle cx="25" cy="-25" r="2" fill="#b5651d" opacity="0.4"/>
    <circle cx="0" cy="30" r="2" fill="#b5651d" opacity="0.4"/>
  </g>
  <text x="600" y="420" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="32" fill="#2c2418" opacity="0.35" letter-spacing="4">WORKSHOP</text>
</svg>